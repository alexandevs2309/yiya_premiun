<!doctype html>
<html lang="es">
  <head>
    <script>
      (function(){try{var t=localStorage.getItem('dyiya-theme');if(t){var s=JSON.parse(t);if(s&&s.state&&s.state.theme){document.documentElement.className=s.state.theme;return}}var m=window.matchMedia('(prefers-color-scheme:light)');document.documentElement.className=m.matches?'light':'dark'}catch(e){document.documentElement.className='dark'}})();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a2744" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="D'Yiya POS" />
    <meta name="mobile-web-app-capable" content="yes" />
